---
- name: Provision
  become: yes
  become_user: vagrant
  hosts:
  - all
  vars:
    user: 'vagrant'
    _awscli_version: '1.16.25'
    _docker_version: '18.06'
    _github_oauth_token: 'CHANGEME'
    _nodejs_version: '8.x'
    _openvpn_admin: 'v0.9.2'
    _packer_version: "1.4.2"
#    _terraform_version: '0.11.13'
#    _terraform_update_variable: 'v0.14.0'
#    _ecs_deploy_version: 'v0.14.1'
#    _terragrunt_version: 'v0.18.7'
#    _golang_install_dir: '/opt/go/{{ _golang_version }}'
#    _cloudnuke_version: "0.1.4"
#    _grunt_kms_version: 'v0.0.8'
  pre_tasks:
  - name: Gathering facts
    setup:
  - name: Install required system packages
    apt:
      name: "{{ packages }}"
    vars:
      packages:
      - jq
      - openvpn
      - tree
      - xclip
      - ntpdate
      - htop
      - gnome-tweaks
      - ubuntu-restricted-extras
      - gnome-shell-extension-pixelsaver
      - dos2unix
      - p7zip-full
    become: true
    become_user: root
    tags: packages
  environment:
        GITHUB_OAUTH_TOKEN: "{{ _github_oauth_token }}"
  roles:
  - role: nodejs
    nodejs_version: '{{ _nodejs_version }}'
    tags: nodejs
    become: true
    become_user: root
  - role: awscli
    awscli_version: '{{ _awscli_version }}'
    awscli_users:
    - username: '{{ user }}'
      output: text
    become: true
    become_user: root
    tags: awscli
  - role: docker
    docker_version: '{{ _docker_version }}'
    docker_users: '{{ user }}'
    become: true
    become_user: root
    tags: docker
  - role: packer
    packer_version: '{{ _packer_version }}'
    become: true
    become_user: root
    tags: packer
  - role: chrome
    become: true
    become_user: root
    tags: chrome
  - role: intellij
    intellij_edition: ultimate
    become: true
    become_user: root
    tags: intellij
  - role: vscode
    become: true
    become_user: root
    tags: vscode

  tasks:
  - name: Set bashrc file
    template:
      src: templates/bashrc.j2
      dest: /home/vagrant/.bashrc
      owner: '{{ user }}'
      group: '{{ user }}'    
      mode: 0544
    tags: bashrc
  - name: Add timesyncd conf
    copy:
      src:  files/timesyncd.conf
      dest: /etc/systemd/timesyncd.conf
      mode: 0644
    become: true
    become_user: root
    tags: aliases
